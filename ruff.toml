[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = [
    "E501",  # line too long — handled by formatter
    "F401",  # unused imports in __init__.py files
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["F811"]  # allow redefinition in tests
"**/__init__.py" = ["F401"]
