name: SAST

# Thin caller stub: logic lives in amcheste/gh-workflows. Add language rule
# packs via the semgrep-config input (p/secrets is the universal floor).
# Dependabot bumps the pin as gh-workflows releases.

on:
  push:
    branches: [main, develop]
  # No branch filter: stacked PRs (base = another feature branch) must get CI too.
  pull_request:
  schedule:
    - cron: '0 2 * * 1'  # Every Monday at 02:00 UTC

permissions:
  contents: read

jobs:
  semgrep:
    uses: amcheste/gh-workflows/.github/workflows/reusable-sast.yml@v1.1.3
    with:
      semgrep-config: >-
        p/secrets
        p/owasp-top-ten
        p/python
