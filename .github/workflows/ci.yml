name: CI

on:
  push:
    branches: [main, develop]
  # No branch filter: stacked PRs (base = another feature branch) must get CI too.
  pull_request:

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Check formatting
        run: ruff format --check .

      - name: Check lint
        run: ruff check .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run mypy
        run: mypy src/ tools/ agents/ --ignore-missing-imports --no-strict-optional

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        # Coverage omits the scraper, tool, and agents — they require live credentials.
        # See .coveragerc for the omit list. Threshold (55%) reflects that the preprocessor's
        # OpenCV video functions are also untestable in CI without real video files.
        run: pytest tests/ -v --cov=src --cov=tools --cov-report=term-missing --cov-fail-under=55

  security:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies
        # CVE-2026-4539 (pygments), CVE-2025-69872 (diskcache), and PYSEC-2026-311
        # (chromadb) are transitive dependencies with no fix version available yet —
        # ignored pending upstream fixes.
        run: |
          pip-audit -r requirements.txt --skip-editable \
            --ignore-vuln CVE-2026-4539 \
            --ignore-vuln CVE-2025-69872 \
            --ignore-vuln PYSEC-2026-311
