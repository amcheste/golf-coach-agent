# Pre-commit hooks: the first layer of the secret-scanning defense. See
# https://github.com/amcheste/engineering-handbook/blob/develop/docs/philosophies/security-posture.md
#
# One-time setup:  pre-commit install
# After that every `git commit` scans the staged diff; a detected secret
# fails the commit before it ever enters git history.
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
